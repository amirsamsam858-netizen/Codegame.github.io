                <div style="font-size:1.7rem; font-weight:bold; text-align:center; margin:20px 0; color:#0000ff;">اپ سورس کد</div><div style="text-align:center; margin:15px 0;"><a href="#page2"  style="display:inline-block; background:#3b82f6; color:white; padding:12px 30px; border-radius:60px; text-decoration:none; font-weight:bold;">شروع </a></div>

                </div><div id="page3" class="page-section" style="display:none;">
                <div style="font-size:1.7rem; font-weight:bold; text-align:center; margin:20px 0; color:#00ff00;">روی هر کدام بزن کد برات کپی میشه</div><div style="text-align:center; margin:15px 0;"><button class="copy-btn" data-copy="<!DOCTYPE html> <html lang=&quot;fa&quot;> <head>   <meta charset=&quot;UTF-8&quot; />   <meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot; />   <title>2D Hollow Knight Style Game</title>   <style>     html, body {       margin: 0;       padding: 0;       overflow: hidden;       background: #050608;       font-family: Arial, sans-serif;     }      canvas {       display: block;       background: radial-gradient(circle at center, #10131c 0%, #050608 70%);       image-rendering: pixelated;     }      .hud {       position: fixed;       top: 12px;       left: 12px;       color: #e7e7e7;       font-size: 14px;       user-select: none;       text-shadow: 0 0 8px rgba(255,255,255,0.15);       line-height: 1.8;     }      .hint {       position: fixed;       bottom: 12px;       left: 12px;       color: #9ca3af;       font-size: 13px;       user-select: none;     }      .bar {       width: 180px;       height: 10px;       background: #1f2937;       border: 1px solid #374151;       border-radius: 999px;       overflow: hidden;       margin-top: 4px;     }      .bar > div {       height: 100%;       background: linear-gradient(90deg, #ef4444, #f97316);       width: 100%;     }   </style> </head> <body>   <canvas id=&quot;game&quot;></canvas>    <div class=&quot;hud&quot;>     <div>HP</div>     <div class=&quot;bar&quot;><div id=&quot;hpFill&quot;></div></div>     <div>Kill Count: <span id=&quot;kills&quot;>0</span></div>   </div>    <div class=&quot;hint&quot;>     کنترل‌ها: ← → حرکت | Shift دویدن | Space پرش | Z حمله | R ریست   </div>    <script>     const canvas = document.getElementById(&quot;game&quot;);     const ctx = canvas.getContext(&quot;2d&quot;);      const hpFill = document.getElementById(&quot;hpFill&quot;);     const killsText = document.getElementById(&quot;kills&quot;);      function resize() {       canvas.width = window.innerWidth;       canvas.height = window.innerHeight;     }     window.addEventListener(&quot;resize&quot;, resize);     resize();      const keys = {};     window.addEventListener(&quot;keydown&quot;, (e) => {       keys[e.key.toLowerCase()] = true;       if (e.key === &quot; &quot;) e.preventDefault();       if (e.key.toLowerCase() === &quot;r&quot;) resetGame();     });     window.addEventListener(&quot;keyup&quot;, (e) => {       keys[e.key.toLowerCase()] = false;     });      const gravity = 0.55;     const friction = 0.82;      const world = {       cameraX: 0,       cameraY: 0,       kills: 0     };      const player = {       x: 120,       y: 100,       w: 28,       h: 42,       vx: 0,       vy: 0,       speed: 0.7,       maxSpeed: 4.2,       jumpPower: 11.5,       grounded: false,       facing: 1,       hp: 5,       maxHp: 5,       attacking: false,       attackTimer: 0,       attackCooldown: 0,       invincible: 0     };      const platforms = [       { x: -200, y: 520, w: 1800, h: 60 },       { x: 180, y: 410, w: 160, h: 18 },       { x: 420, y: 340, w: 170, h: 18 },       { x: 690, y: 290, w: 180, h: 18 },       { x: 940, y: 390, w: 150, h: 18 },       { x: 1120, y: 320, w: 180, h: 18 }     ];      const enemies = [];     function spawnEnemy(x, y) {       enemies.push({         x, y,         w: 28, h: 32,         vx: Math.random() < 0.5 ? -1 : 1,         vy: 0,         hp: 2,         alive: true,         aiTimer: 0,         hitFlash: 0       });     }      spawnEnemy(500, 308);     spawnEnemy(760, 258);     spawnEnemy(1180, 288);      const particles = [];      function resetGame() {       player.x = 120;       player.y = 100;       player.vx = 0;       player.vy = 0;       player.hp = player.maxHp;       player.grounded = false;       player.invincible = 0;       world.kills = 0;       killsText.textContent = world.kills;       enemies.length = 0;       spawnEnemy(500, 308);       spawnEnemy(760, 258);       spawnEnemy(1180, 288);       particles.length = 0;     }      function rectsOverlap(a, b) {       return (         a.x < b.x + b.w &amp;&amp;         a.x + a.w > b.x &amp;&amp;         a.y < b.y + b.h &amp;&amp;         a.y + a.h > b.y       );     }      function attackHitbox() {       return {         x: player.facing === 1 ? player.x + player.w : player.x - 18,         y: player.y + 8,         w: 18,         h: 24       };     }      function emitParticles(x, y, color, count = 8) {       for (let i = 0; i < count; i++) {         particles.push({           x, y,           vx: (Math.random() - 0.5) * 5,           vy: (Math.random() - 0.5) * 5 - 1,           life: 30 + Math.random() * 20,           color         });       }     }      function updatePlayer() {       const left = keys[&quot;arrowleft&quot;] || keys[&quot;a&quot;];       const right = keys[&quot;arrowright&quot;] || keys[&quot;d&quot;];       const sprint = keys[&quot;shift&quot;];       const jump = keys[&quot; &quot;];       const attack = keys[&quot;z&quot;];        const currentMax = sprint ? 6.2 : player.maxSpeed;       const accel = sprint ? 0.95 : player.speed;        if (left) {         player.vx -= accel;         player.facing = -1;       }       if (right) {         player.vx += accel;         player.facing = 1;       }        if (!left &amp;&amp; !right) {         player.vx *= friction;       }        player.vx = Math.max(-currentMax, Math.min(currentMax, player.vx));        if (jump &amp;&amp; player.grounded) {         player.vy = -player.jumpPower;         player.grounded = false;       }        if (attack &amp;&amp; player.attackCooldown <= 0 &amp;&amp; !player.attacking) {         player.attacking = true;         player.attackTimer = 12;         player.attackCooldown = 18;       }        if (player.attackCooldown > 0) player.attackCooldown--;       if (player.invincible > 0) player.invincible--;        player.vy += gravity;       player.x += player.vx;       player.y += player.vy;        player.grounded = false;        for (const p of platforms) {         if (rectsOverlap(player, p)) {           const prevBottom = (player.y - player.vy) + player.h;           const prevTop = (player.y - player.vy);           const prevRight = (player.x - player.vx) + player.w;           const prevLeft = (player.x - player.vx);            if (prevBottom <= p.y) {             player.y = p.y - player.h;             player.vy = 0;             player.grounded = true;           } else if (prevTop >= p.y + p.h) {             player.y = p.y + p.h;             player.vy = 0;           } else if (prevRight <= p.x) {             player.x = p.x - player.w;             player.vx = 0;           } else if (prevLeft >= p.x + p.w) {             player.x = p.x + p.w;             player.vx = 0;           }         }       }        if (player.y > canvas.height + 300) {         player.hp -= 1;         player.x = 120;         player.y = 100;         player.vx = 0;         player.vy = 0;         player.invincible = 120;       }        if (player.attacking) {         player.attackTimer--;         if (player.attackTimer <= 0) player.attacking = false;       }        const hit = attackHitbox();       if (player.attacking) {         for (const e of enemies) {           if (e.alive &amp;&amp; rectsOverlap(hit, e)) {             e.hp -= 1;             e.hitFlash = 10;             emitParticles(e.x + e.w / 2, e.y + e.h / 2, &quot;#facc15&quot;, 10);             if (e.hp <= 0) {               e.alive = false;               world.kills++;               killsText.textContent = world.kills;               emitParticles(e.x + e.w / 2, e.y + e.h / 2, &quot;#22d3ee&quot;, 18);             }           }         }       }        hpFill.style.width = `${(player.hp / player.maxHp) * 100}%`;       if (player.hp <= 0) {         resetGame();       }        world.cameraX = player.x - canvas.width / 2 + player.w / 2;       if (world.cameraX < -80) world.cameraX = -80;     }      function updateEnemies() {       for (const e of enemies) {         if (!e.alive) continue;          e.aiTimer++;         e.vy += gravity;         e.x += e.vx * 1.4;         e.y += e.vy;          for (const p of platforms) {           if (rectsOverlap(e, p)) {             const prevBottom = (e.y - e.vy) + e.h;             const prevTop = (e.y - e.vy);             const prevRight = (e.x - e.vx * 1.4) + e.w;             const prevLeft = (e.x - e.vx * 1.4);              if (prevBottom <= p.y) {               e.y = p.y - e.h;               e.vy = 0;               if (Math.random() < 0.01) e.vx *= -1;             } else if (prevRight <= p.x || prevLeft >= p.x + p.w) {               e.vx *= -1;             }           }         }          const dx = player.x - e.x;         const dy = player.y - e.y;         const dist = Math.hypot(dx, dy);          if (dist < 180) {           e.vx += dx > 0 ? 0.03 : -0.03;           e.vx = Math.max(-1.6, Math.min(1.6, e.vx));         } else if (e.aiTimer % 180 === 0) {           e.vx = (Math.random() < 0.5 ? -1 : 1) * 1.1;         }          if (rectsOverlap(player, e) &amp;&amp; player.invincible <= 0) {           player.hp -= 1;           player.invincible = 60;           player.vx = dx > 0 ? -5 : 5;           player.vy = -6;           emitParticles(player.x + player.w / 2, player.y + player.h / 2, &quot;#fb7185&quot;, 14);         }          if (e.hitFlash > 0) e.hitFlash--;       }     }      function updateParticles() {       for (const p of particles) {         p.x += p.vx;         p.y += p.vy;         p.vy += 0.12;         p.life--;       }       for (let i = particles.length - 1; i >= 0; i--) {         if (particles[i].life <= 0) particles.splice(i, 1);       }     }      function drawBackground() {       const cx = canvas.width / 2;       const cy = canvas.height / 2;        // stars       for (let i = 0; i < 50; i++) {         const x = (i * 197.3 + world.cameraX * 0.2) % canvas.width;         const y = (i * 83.7) % canvas.height;         ctx.fillStyle = &quot;rgba(255,255,255,0.08)&quot;;         ctx.fillRect(x, y, 2, 2);       }        // distant mist       ctx.fillStyle = &quot;rgba(99,102,241,0.08)&quot;;       ctx.beginPath();       ctx.arc(cx - 200, cy - 120, 180, 0, Math.PI * 2);       ctx.fill();        ctx.fillStyle = &quot;rgba(34,211,238,0.05)&quot;;       ctx.beginPath();       ctx.arc(cx + 220, cy + 40, 220, 0, Math.PI * 2);       ctx.fill();     }      function drawPlatforms() {       for (const p of platforms) {         const x = p.x - world.cameraX;         const y = p.y - world.cameraY;         ctx.fillStyle = &quot;#111827&quot;;         ctx.fillRect(x, y, p.w, p.h);         ctx.strokeStyle = &quot;rgba(255,255,255,0.08)&quot;;         ctx.strokeRect(x, y, p.w, p.h);          // glow edges         ctx.fillStyle = &quot;rgba(56,189,248,0.08)&quot;;         ctx.fillRect(x, y - 2, p.w, 2);       }     }      function drawPlayer() {       const x = player.x - world.cameraX;       const y = player.y - world.cameraY;        ctx.save();       if (player.invincible > 0 &amp;&amp; Math.floor(player.invincible / 4) % 2 === 0) {         ctx.globalAlpha = 0.4;       }        // body       ctx.fillStyle = &quot;#d1d5db&quot;;       ctx.fillRect(x, y, player.w, player.h);        // cloak       ctx.fillStyle = &quot;#0f172a&quot;;       ctx.fillRect(x + 4, y + 8, player.w - 8, player.h - 8);        // head glow       ctx.fillStyle = &quot;rgba(255,255,255,0.9)&quot;;       ctx.fillRect(x + 8, y + 6, 12, 10);        // eye       ctx.fillStyle = &quot;#000&quot;;       ctx.fillRect(x + 13, y + 10, 3, 3);        // attack slash       if (player.attacking) {         const hb = attackHitbox();         const hx = hb.x - world.cameraX;         const hy = hb.y - world.cameraY;         ctx.fillStyle = &quot;rgba(250, 204, 21, 0.75)&quot;;         ctx.fillRect(hx, hy, hb.w, hb.h);       }        ctx.restore();     }      function drawEnemies() {       for (const e of enemies) {         if (!e.alive) continue;         const x = e.x - world.cameraX;         const y = e.y - world.cameraY;          ctx.save();         if (e.hitFlash > 0) ctx.globalAlpha = 0.7;          ctx.fillStyle = &quot;#7c3aed&quot;;         ctx.fillRect(x, y, e.w, e.h);          ctx.fillStyle = &quot;#e5e7eb&quot;;         ctx.fillRect(x + 6, y + 8, 6, 6);         ctx.fillRect(x + 16, y + 8, 6, 6);          ctx.fillStyle = &quot;#111827&quot;;         ctx.fillRect(x + 10, y + 20, 8, 3);          ctx.restore();       }     }      function drawParticles() {       for (const p of particles) {         ctx.fillStyle = p.color;         ctx.globalAlpha = Math.max(0, p.life / 50);         ctx.fillRect(p.x - world.cameraX, p.y - world.cameraY, 3, 3);       }       ctx.globalAlpha = 1;     }      function drawFog() {       ctx.fillStyle = &quot;rgba(255,255,255,0.02)&quot;;       for (let i = 0; i < 10; i++) {         ctx.fillRect(0, i * 80 + (world.cameraX * 0.1 % 80), canvas.width, 1);       }     }      function loop() {       ctx.clearRect(0, 0, canvas.width, canvas.height);        drawBackground();       updatePlayer();       updateEnemies();       updateParticles();        drawPlatforms();       drawEnemies();       drawPlayer();       drawParticles();       drawFog();        requestAnimationFrame(loop);     }      loop();   </script> </body> </html>" style="background:#0000ff; color:white; padding:12px 30px; border-radius:60px; border:none; font-weight:bold; cursor:pointer; font-size:1rem;">هالو نایت </button></div><div style="text-align:center; margin:15px 0;"><button class="copy-btn" data-copy="<!DOCTYPE html> <html lang=&quot;fa&quot; dir=&quot;rtl&quot;> <head>   <meta charset=&quot;UTF-8&quot; />   <meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot; />   <title>AFO GAME</title>   <style>     * {       box-sizing: border-box;       font-family: Tahoma, sans-serif;     }      body {       margin: 0;       padding: 0;       background: linear-gradient(135deg, #0f172a, #1e293b, #334155);       color: white;     }      .container {       max-width: 900px;       margin: 30px auto;       padding: 20px;     }      .card {       background: rgba(255,255,255,0.08);       border-radius: 18px;       padding: 20px;       margin-bottom: 20px;       box-shadow: 0 8px 25px rgba(0,0,0,0.25);       backdrop-filter: blur(6px);     }      h1, h2, h3 {       text-align: center;       margin-top: 0;     }      .title {       font-size: 34px;       font-weight: bold;       color: #38bdf8;       text-shadow: 0 0 10px rgba(56,189,248,0.5);     }      input {       width: 100%;       padding: 14px;       margin: 8px 0;       border: none;       border-radius: 12px;       outline: none;       font-size: 16px;     }      button {       width: 100%;       padding: 14px;       margin-top: 10px;       border: none;       border-radius: 12px;       background: #38bdf8;       color: white;       font-size: 16px;       cursor: pointer;       transition: 0.3s;       font-weight: bold;     }      button:hover {       background: #0ea5e9;       transform: scale(1.02);     }      .menu-btn {       margin-bottom: 12px;       font-size: 18px;     }      .hidden {       display: none;     }      .item {       background: rgba(255,255,255,0.09);       border-radius: 15px;       padding: 15px;       margin: 12px 0;     }      .item h3 {       margin: 0 0 10px 0;       color: #facc15;     }      .item p {       margin: 0 0 10px 0;       line-height: 1.8;       color: #e2e8f0;     }      .install-btn {       background: #22c55e;     }      .install-btn:hover {       background: #16a34a;     }      .back-btn {       background: #f97316;     }      .back-btn:hover {       background: #ea580c;     }      .support-btn {       background: #a855f7;     }      .support-btn:hover {       background: #9333ea;     }      .logout-btn {       background: #ef4444;     }      .logout-btn:hover {       backgrou <script>
  (function(){
    var historyStack = [];
    var currentPageId = 'page1';
    var backBtn = document.getElementById('backBtn');

    function showPage(id) {
      if (id === currentPageId) return;
      document.querySelectorAll('.page-section').forEach(function(sec) {
        sec.style.display = 'none';
      });
      var target = document.getElementById(id);
      if (target) {
        target.style.display = 'block';
        currentPageId = id;
        backBtn.style.display = historyStack.length > 0 ? 'block' : 'none';
      }
    }

    window.goBack = function() {
      if (historyStack.length > 0) {
        var prevPage = historyStack.pop();
        showPage(prevPage);
      }
    };

    document.body.addEventListener('click', function(e) {
      var link = e.target.closest('a');
      if (link) {
        var href = link.getAttribute('href');
        if (href && href.startsWith('#')) {
          e.preventDefault();
          var pageId = href.substring(1);
          if (pageId && pageId !== currentPageId) {
            historyStack.push(currentPageId);
            showPage(pageId);
          }
        }
      }
      var copyBtn = e.target.closest('.copy-btn');
      if (copyBtn) {
        var text = copyBtn.getAttribute('data-copy');
        if (text) {
          navigator.clipboard.writeText(text).then(function() {
            var orig = copyBtn.textContent;
            copyBtn.textContent = '✅ کپی شد';
            setTimeout(function() { copyBtn.textContent = orig; }, 1500);
          }).catch(function() {
            alert('کپی ناموفق بود');
          });
        }
      }
    });

    if (window.location.hash) {
      var hashId = window.location.hash.substring(1);
      if (hashId && hashId !== currentPageId) {
        historyStack.push(currentPageId);
        showPage(hashId);
      }
    }
  })();
</script>
